<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон #101010 -- три изображения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #101010;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
        }

        .top-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .center-image {
            display: block;
            max-width: 90%;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .bottom-image {
            display: block;
            max-width: 90%;
            height: auto;
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <img class="top-image" src="20260430_140817.png" alt="53.png">
    <img class="center-image" src="20260430_142919.png" alt="p">
    <img class="bottom-image" src="20260430_144522.png" alt="20260430_144522.png">
</body>
</html>
